{% load static %}

{% block content %}
<div class="container py-4">
  <div class="card shadow mx-auto" style="max-width: 500px;">
    <div class="card-body">
      <h2 class="card-title mb-4 text-center">Nouvelle entrée de stock</h2>
      <form id="nouvelleEntreeForm" method="post" action="{% url 'nouvelle_entree' %}" class="needs-validation" novalidate>
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="invalid-feedback d-block">
                {{ field.errors|striptags }}
              </div>
            {% endif %}
          </div>
        {% endfor %}
        <div class="d-flex justify-content-between">
          <button type="submit" class="btn btn-success w-50">Valider</button>
          <a href="{% url 'articles' %}" class="btn btn-secondary ms-2 w-50">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

<script>
// Fonction pour récupérer le token CSRF
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

document.getElementById('nouvelleEntreeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    let form = this;
    let formData = new FormData(form);

    fetch(form.action, {
        method: 'POST',
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: formData
    })
    .then(response => response.text())
    .then(html => {
        // Ferme la modale précédente si besoin
        if (window.bootstrap && bootstrap.Modal) {
            let modals = document.querySelectorAll('.modal.show');
            modals.forEach(modal => bootstrap.Modal.getInstance(modal)?.hide());
        }
        document.getElementById('articlesModal')?.remove();
        // Crée une nouvelle modale pour afficher la liste des articles :
        let modalHtml = `
        <div class="modal fade" id="articlesModal" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Liste des articles</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body p-4">${html}</div>
            </div>
          </div>
        </div>`;
        let modalContainer = document.createElement('div');
        modalContainer.innerHTML = modalHtml;
        document.body.appendChild(modalContainer);
        let newModal = new bootstrap.Modal(document.getElementById('articlesModal'));
        newModal.show();
    })
    .catch(() => alert('Erreur lors de l\'ajout.'));
});
</script>
