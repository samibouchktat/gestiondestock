

{% block content %}
<div class="container py-4">
  <h2>Nouvelle sortie de stock</h2>
<form id="nouvelleSortieForm" method="post" action="{% url 'nouvelle_sortie' %}" class="needs-validation" novalidate>
  {% csrf_token %}
    <div class="mb-3">
      <label for="{{ form.article.id_for_label }}" class="form-label">Article</label>
      {{ form.article }}
    </div>
    <div class="mb-3">
      <label for="{{ form.quantite.id_for_label }}" class="form-label">Quantité</label>
      {{ form.quantite }}
      {% if form.quantite.errors %}
        <div class="invalid-feedback d-block">
          {{ form.quantite.errors.0 }}
        </div>
      {% endif %}
    </div>
    <div class="mb-3">
      <label for="{{ form.motif.id_for_label }}" class="form-label">Motif (optionnel)</label>
      {{ form.motif }}
    </div>
    <button type="submit" class="btn btn-danger">Valider la sortie</button>
    <a href="{% url 'articles' %}" class="btn btn-secondary ms-2">Annuler</a>
  </form>
</div>
{% endblock %}
<script>
// Fonction CSRF Django
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Lance seulement quand le DOM est chargé
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('nouvelleSortieForm');
    if (!form) return;

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        let formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            // Ferme les modales ouvertes
            if (window.bootstrap && bootstrap.Modal) {
                let modals = document.querySelectorAll('.modal.show');
                modals.forEach(modal => bootstrap.Modal.getInstance(modal)?.hide());
            }
            // Supprime la modale précédente
            document.getElementById('articlesModal')?.remove();
            // Crée une nouvelle modale avec la liste des articles
            let modalHtml = `
            <div class="modal fade" id="articlesModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title">Liste des articles</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body p-4">${html}</div>
                </div>
              </div>
            </div>`;
            let modalContainer = document.createElement('div');
            modalContainer.innerHTML = modalHtml;
            document.body.appendChild(modalContainer);
            let newModal = new bootstrap.Modal(document.getElementById('articlesModal'));
            newModal.show();
        })
        .catch(() => alert('Erreur lors de la sortie de stock.'));
    });
});
</script>
